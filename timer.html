<!DOCTYPE html>
<html>

<head>

<title>Focus Timer</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white text-center mt-40">

<h1 class="text-5xl mb-6">Focus Timer</h1>

<div id="timer" class="text-6xl">25:00</div>

<div class="mt-8">

<button onclick="startTimer()" class="bg-green-500 px-6 py-2 rounded">
Start
</button>

<button onclick="resetTimer()" class="bg-red-500 px-6 py-2 rounded ml-3">
Reset
</button>

</div>

<script src="js/timer.js"></script>

</body>
</html>
