<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white flex justify-center items-center h-screen">

<div class="bg-gray-800 p-10 rounded">

<h2 class="text-2xl mb-6">Create Account</h2>

<input id="email" placeholder="Email" class="w-full p-2 mb-3 text-black">

<input id="password" type="password" placeholder="Password" class="w-full p-2 mb-3 text-black">

<button onclick="register()" class="bg-green-500 px-6 py-2 rounded w-full">
Register
</button>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
