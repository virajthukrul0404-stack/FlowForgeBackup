<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowForge - Master Your Study</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-900 text-white font-sans antialiased overflow-hidden">

    <!-- Background Gradient -->
    <div class="fixed inset-0 z-0">
        <div class="absolute top-0 left-0 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
        <div class="absolute top-0 right-0 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-96 h-96 bg-pink-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Navigation -->
    <nav class="relative z-10 flex justify-between items-center p-6 max-w-7xl mx-auto">
        <div class="text-2xl font-bold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600">
            FlowForge
        </div>
        <div id="nav-buttons">
            <!-- Buttons injected by JS based on auth state -->
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="relative z-10 flex flex-col items-center justify-center h-screen text-center px-4">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
            Forge Your <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">Flow</span>
        </h1>
        <p class="text-xl text-gray-400 mb-10 max-w-2xl">
            The ultimate productivity platform for students. Track your streaks, join study rooms, and master the Pomodoro technique.
        </p>
        <div class="flex gap-4">
            <button onclick="window.location.href='login.html'" class="px-8 py-3 bg-white text-gray-900 rounded-full font-bold hover:bg-gray-200 transition transform hover:scale-105 shadow-lg shadow-purple-500/30">
                Get Started
            </button>
            <button onclick="window.location.href='register.html'" class="px-8 py-3 border border-gray-600 text-white rounded-full font-bold hover:bg-gray-800 transition">
                Sign Up
            </button>
        </div>
    </main>

    <script type="module" src="js/auth.js"></script>
    <script>
        // Simple check to redirect if already logged in
        const navContainer = document.getElementById('nav-buttons');
        // This logic is handled in auth.js, but we can add a simple listener here if needed
    </script>
</body>
</html>
